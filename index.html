<!DOCTYPE html>
<html>
<head>
    <title>Bhavishya Arts</title>

    <style>
        body {
            background-color: black;
            color: white;
            text-align: center;
            font-family: Arial;
        }

        h1 {
            margin: 20px;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .gallery img {
            width: 200px;
            margin: 10px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .gallery img:hover {
            transform: scale(1.1);
        }
    </style>

</head>
<body>

    <h1>🎨 Bhavishya Arts Gallery</h1>
    <p>My best drawings collection 😎🔥</p>

    <div class="gallery">
        <img src="drawing1.jpg">
        <img src="drawing2.jpg">
        <img src="drawing3.jpg">
        <img src="drawing4.jpg">
    </div>

    <p>Made with ❤️ by Bhavishya</p>

</body>
</html>
