<!DOCTYPE html>
<html>
<head>
    <title>Bhavishya Arts</title>

    <style>
    body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
        color: white;
        font-family: 'Poppins', sans-serif;
        text-align: center;
    }

    h1 {
        margin-top: 20px;
        font-size: 35px;
        text-shadow: 0 0 15px cyan;
    }

    p {
        color: #ccc;
        font-size: 16px;
    }

    .gallery {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        padding: 20px;
    }

    .gallery img {
        width: 200px;
        margin: 15px;
        border-radius: 15px;
        transition: 0.4s;
        box-shadow: 0 0 15px rgba(0,255,255,0.3);
    }

    .gallery img:hover {
        transform: scale(1.15) rotate(2deg);
        box-shadow: 0 0 30px cyan;
    }

    h2 {
        margin-top: 40px;
        color: cyan;
    }

    a {
        color: cyan;
        text-decoration: none;
    }

    a:hover {
        text-shadow: 0 0 10px cyan;
    }

    footer {
        margin-top: 30px;
        padding: 10px;
        background: rgba(0,0,0,0.5);
    }
    </style>
</head>

    <h1>🎨 Bhavishya Arts Gallery</h1>
    <p>My best drawings collection 😎🔥</p>

    <div class="gallery">

        <img src="drawing2.jpg">
